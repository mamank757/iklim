<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor Iklim - Petani Digital</title>

<style>
:root { 
    --primary: #81c784; 
    --bg-dark: #121212; 
    --card-dark: #1e1e1e; 
    --text-main: #e0e0e0; 
    --blue: #64b5f6; 
    --orange: #fb8c00;
}

body { 
    font-family: 'Segoe UI', sans-serif; 
    background-color: var(--bg-dark); 
    color: var(--text-main); 
    margin: 0; 
    padding: 20px; 
    max-width: 1400px;
    margin-left: auto;
    margin-right: auto;
}

/* CONTAINER */
.container { 
    width: 100%; 
    background: var(--card-dark); 
    border-radius: 20px; 
    border: 1px solid #333; 
    margin-top: 20px; 
}

/* HEADER */
.header-bar { 
    padding: 15px; 
    text-align: center; 
    font-weight: bold; 
    background: var(--blue);
}

/* CONTENT */
.content { padding: 20px; }

/* GRID RESPONSIVE */
.row {
    display: grid;
    grid-template-columns: 1fr;
    gap:20px;
}

@media (min-width: 768px) {
    .row {
        grid-template-columns: 1fr 1fr;
    }
}

@media (min-width: 1200px) {
    .row {
        grid-template-columns: 1fr 1fr;
        gap:30px;
    }

    .content {
        padding:30px;
    }
}

/* CARD */
.card {
    background:#252525;
    padding:20px;
    border-radius:12px;
    border:1px solid #333;
}

/* NOAA */
.noaa {
    border:1px solid var(--orange);
    box-shadow: 0 0 15px rgba(251,140,0,0.2);
}

/* IMAGE */
.grafik-img { 
    width: 100%; 
    border-radius: 10px; 
    border: 1px solid #444; 
}

/* BUTTON */
.btn {
    display:block;
    margin-top:10px;
    padding:10px;
    text-align:center;
    border-radius:8px;
    text-decoration:none;
    border:1px solid var(--blue);
    color:var(--blue);
}

/* TEXT */
.caption {
    margin-top:10px;
    font-size:13px;
    color:#ccc;
}

/* NOAA STYLE */
.big {
    font-size:40px;
    font-weight:bold;
}

.status {
    font-size:20px;
    margin-top:5px;
}

.impact {
    margin-top:10px;
    font-size:16px;
}

.meta {
    margin-top:10px;
    font-size:12px;
    color:#aaa;
}
</style>
</head>

<body>

<!-- ================= ENSO ================= -->
<div class="container">
    <div class="header-bar">🌍 MONITOR ENSO (NINO 3.4)</div>

    <div class="content">
        <div class="row">

            <!-- BOM -->
            <div class="card">
                <b style="color:#64b5f6;">🌐 BoM (Visual)</b>

                <img id="imgNino"
                src="https://via.placeholder.com/400x200?text=Menunggu+ENSO"
                class="grafik-img">

                <a href="https://www.bom.gov.au/climate/ocean/outlooks/?index=nino34#tabs=Graphs"
                target="_blank" class="btn">
                Buka BoM
                </a>

                <div class="caption">
                    Merah = El Niño (kering)<br>
                    Biru = La Niña (basah)
                </div>
            </div>

            <!-- NOAA -->
            <div class="card noaa">
                <b style="color:#fb8c00;">📡 NUMERIK (NOAA)</b>

                <div id="ensoDisplay" style="margin-top:10px;">
                    Memuat data ENSO...
                </div>
            </div>

        </div>
    </div>
</div>

<!-- ================= IOD ================= -->
<div class="container">
    <div class="header-bar" style="background:#ab47bc;">🌊 MONITOR IOD</div>

    <div class="content">
        <img id="imgIOD"
        src="https://via.placeholder.com/400x200?text=Menunggu+IOD"
        class="grafik-img">
    </div>
</div>

<!-- ================= HUJAN ================= -->
<div class="container">
    <div class="header-bar" style="background:#ffca28; color:#333;">
        🌧️ PREDIKSI HUJAN
    </div>

    <div class="content">
        <img id="imgHujan"
        src="https://via.placeholder.com/400x200?text=Menunggu+Hujan"
        class="grafik-img">
    </div>
</div>

<script>

// STATUS
function statusENSO(v){
    if (v >= 0.8) return "El Niño 🔥 (Kering)";
    if (v <= -0.8) return "La Niña 🌧️ (Basah)";
    return "Netral 🌤️";
}

function dampakPetani(v){
    if (v >= 1.0) return "⚠️ Risiko kekeringan tinggi";
    if (v >= 0.5) return "⚠️ Mulai lebih kering";
    if (v <= -1.0) return "🌧️ Risiko hujan berlebih";
    if (v <= -0.5) return "🌧️ Lebih basah dari normal";
    return "🌤️ Kondisi normal";
}

// NOAA
async function ambilNino(){
    const url = "https://script.google.com/macros/s/AKfycbw7QByp3LaeBqQF6Xa2cztMzbt8BGrAsR_E_2MBPwBthj9kF-Xr0KGDPvVxTnzsJzFw7g/exec";

    try {
        const res = await fetch(url + "?t=" + Date.now());
        const data = await res.json();

        let v = parseFloat(data.enso);
        if (isNaN(v)) v = 0;

        const status = statusENSO(v);
        const dampak = dampakPetani(v);
        const sumber = data.source || "NOAA";

        let warna = "#64b5f6";
        if (v >= 0.8) warna = "#fb8c00";
        if (v <= -0.8) warna = "#42a5f5";

        document.getElementById("ensoDisplay").innerHTML = `
            <div class="big" style="color:${warna}">
                ${v.toFixed(2)} °C
            </div>

            <div class="status">
                ${status}
            </div>

            <div class="impact">
                ${dampak}
            </div>

            <div class="meta">
                Sumber: ${sumber} • ${new Date().toLocaleString('id-ID')}
            </div>

            <div class="meta" style="color:#888;">
                Data real-time dari NOAA
            </div>
        `;

    } catch {
        document.getElementById("ensoDisplay").innerHTML = `
            <div class="big">0.00 °C</div>
            <div class="status">Netral 🌤️</div>
            <div class="impact">🌤️ Kondisi normal</div>
            <div class="meta">Sumber: FALLBACK • ${new Date().toLocaleString('id-ID')}</div>
            <div class="meta">Data real-time dari NOAA</div>
        `;
    }
}

// IMAGE
async function ambilImg(){
    const url = "https://script.google.com/macros/s/AKfycbw58DC-q7bJ9z5ZKEruLE7XOMEPNzZBfEl-_Bs6UAf5SMn43zEKz8StgkY6IqUtV-rF/exec";

    try {
        const res = await fetch(url + "?t=" + Date.now());
        const data = await res.json();

        if (data.nino) imgNino.src = data.nino;
        if (data.iod) imgIOD.src = data.iod;
        if (data.hujan) imgHujan.src = data.hujan;
    } catch {}
}

// RUN
ambilNino();
ambilImg();

setInterval(ambilNino, 3600000);
setInterval(ambilImg, 10000);

</script>

</body>
</html>
